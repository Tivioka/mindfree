<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MindFree">
<meta name="theme-color" content="#5ABFEC">
<link rel="manifest" href="manifest.json">
<title>MindFree</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{--primary:#5ABFEC;--bg:#F0F8FE;--card:#FFFFFF;--surface:#E4F3FB;--text:#162535;--subtext:#5a7080;--border:#C5E4F5;--nav-bg:#FFFFFF;--danger:#E05252;--success:#3BAF6A;--birthday:#E91E90;--event-col:#5ABFEC;--task-col:#7B61FF;--prog-bg:#DCF0FB;--shadow:0 2px 8px rgba(0,0,0,.07);--r:14px;--font:'DM Sans',sans-serif}
[data-theme=dark]{--primary:#2f6aad;--bg:#111827;--card:#1e293b;--surface:#263045;--text:#E0EDFF;--subtext:#7a99c0;--border:#1f3a6e;--nav-bg:#161f30;--danger:#FF6B6B;--success:#55CC80;--birthday:#FF6EC7;--task-col:#9D88FF;--prog-bg:#1a2e45;--shadow:0 2px 8px rgba(0,0,0,.25)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--text)}
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto}
#sc{display:flex;flex-direction:column;flex:1;overflow:hidden}
.hdr{background:var(--primary);padding:16px 20px;border-radius:0 0 22px 22px;flex-shrink:0}
.hdr-row{display:flex;align-items:center;justify-content:space-between}
.hdr-logo{width:48px;height:48px;object-fit:contain}
.hdr-greet{font-size:15px;font-weight:500;color:rgba(255,255,255,.95)}
.hdr-date{font-size:12px;color:rgba(255,255,255,.7);margin-top:3px}
.nav-hdr{background:var(--primary);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.nav-hdr h1{font-size:19px;font-weight:700;color:#fff}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:4px 0 8px}
.scroll::-webkit-scrollbar{display:none}
.pad{padding:0 14px}
.sec{font-size:11px;font-weight:700;color:var(--primary);letter-spacing:1.2px;padding:18px 0 6px 2px}
.card{background:var(--card);border-radius:var(--r);padding:14px;margin:4px 0;box-shadow:var(--shadow)}
.notif-btn{background:none;border:1.5px solid var(--border);border-radius:8px;padding:4px 10px;font-size:11px;color:var(--subtext);cursor:pointer;font-family:var(--font);transition:all .2s;white-space:nowrap}
.notif-btn:hover{border-color:var(--primary);color:var(--primary)}
.notif-btn.set{border-color:var(--success);color:var(--success);background:rgba(59,175,106,.1)}
.notif-drop{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:10px;margin-top:6px;display:none}
.notif-drop.open{display:block}
.notif-row2{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:6px}
.card-sm{padding:10px 12px}
.prog-wrap{background:var(--card);border-radius:12px;padding:12px;margin:4px 0;box-shadow:var(--shadow)}
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:12px}
.prog-lbl{color:var(--subtext)}
.prog-val{font-weight:700;color:var(--primary)}
.prog-val.done{color:var(--success)}
.prog-track{background:var(--prog-bg);border-radius:4px;height:8px;overflow:hidden}
.prog-fill{height:8px;border-radius:4px;background:var(--primary);transition:width .15s ease}
.prog-fill.done{background:var(--success)}
.ev-row{display:flex;align-items:center;gap:10px}
.ev-icon{font-size:22px;flex-shrink:0}
.ev-body{flex:1;min-width:0}
.ev-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-sub{font-size:11px;margin-top:2px}
.del{background:none;border:none;cursor:pointer;padding:4px;color:var(--danger);font-size:18px;flex-shrink:0;opacity:.8}
.tk-row{display:flex;align-items:center;gap:8px}
.tk-check{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;background:var(--card)}
.tk-check.chk{background:var(--primary);border-color:var(--primary)}
.tk-check.chk::after{content:"✓";color:#fff;font-size:12px;font-weight:700}
.tk-body{flex:1;min-width:0}
.tk-title{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:all .2s}
.tk-title.done{color:var(--subtext);text-decoration:line-through}
.tk-note{font-size:11px;color:var(--subtext);margin-top:2px}
.badge{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;flex-shrink:0}
.mini-cal{background:var(--card);border-radius:var(--r);padding:12px;margin:4px 0;box-shadow:var(--shadow);cursor:pointer}
.mc-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.mc-month{font-size:13px;font-weight:700}
.mc-arr{color:var(--primary);font-weight:700;font-size:16px}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cg.names{margin-bottom:4px}
.cdn{font-size:9px;font-weight:700;color:var(--subtext);text-align:center;padding:2px 0}
.cc{min-height:26px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:6px;cursor:pointer;font-size:10px;color:var(--text)}
.cc.today{background:var(--primary);color:#fff;font-weight:700}
.dot{width:4px;height:4px;border-radius:50%;margin-top:1px}
.cal-nav{background:var(--primary);padding:8px 6px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.cal-nb{background:none;border:none;color:#fff;font-size:26px;cursor:pointer;padding:0 8px;line-height:1}
.cal-nm{font-size:17px;font-weight:700;color:#fff;flex:1;text-align:center}
.cal-wdays{display:grid;grid-template-columns:repeat(7,1fr);background:var(--surface);padding:6px}
.cal-wd{font-size:11px;font-weight:700;color:var(--subtext);text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:6px;background:var(--bg);flex-shrink:0}
.cfc{min-height:38px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:9px;cursor:pointer;font-size:13px;gap:2px}
.cfc.today{background:rgba(90,191,236,.3);color:var(--primary);font-weight:700}
.cfc.sel{background:var(--primary);color:#fff;font-weight:700}
.cdots{display:flex;gap:2px}
.cdot{width:5px;height:5px;border-radius:50%}
.cal-det{flex:1;overflow-y:auto;padding:6px 14px}
.cal-det-date{font-size:15px;font-weight:700;margin-bottom:8px}
.bnav{background:var(--nav-bg);display:flex;border-top:1px solid var(--border);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -2px 10px rgba(0,0,0,.06)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;cursor:pointer;gap:3px;border:none;background:none;transition:all .2s}
.ni-icon{width:22px;height:22px;opacity:.5;transition:all .2s;color:var(--subtext)}
.ni-lbl{font-size:10px;color:var(--subtext);font-weight:500;transition:all .2s}
.ni.active .ni-icon{opacity:1;color:var(--primary)}
.ni.active .ni-lbl{color:var(--primary);font-weight:700}
.ni.add .ni-icon{opacity:1;width:28px;height:28px;color:var(--primary)}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.ov.open{opacity:1;pointer-events:all}
.modal{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:20px;max-height:85vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s ease}
.ov.open .modal{transform:translateY(0)}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px}
.mopt{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border-radius:12px;padding:13px 16px;margin-bottom:6px;cursor:pointer;border:none;width:100%;text-align:left;color:var(--text);font-size:15px;font-family:var(--font);transition:opacity .2s}
.mopt:active{opacity:.7}
.ff{margin-bottom:12px}
.ff label{font-size:12px;color:var(--subtext);margin-bottom:4px;display:block;font-weight:500}
.fi{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text);font-size:14px;font-family:var(--font);outline:none;transition:border-color .2s}
.fi:focus{border-color:var(--primary)}
.fi.err{border-color:var(--danger)}
.sw-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0}
.sw-lbl{font-size:13px}
.sw{position:relative;width:44px;height:24px}
.sw input{opacity:0;width:0;height:0}
.sl{position:absolute;inset:0;background:var(--border);border-radius:24px;transition:.3s;cursor:pointer}
.sl::before{content:"";position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
input:checked+.sl{background:var(--primary)}
input:checked+.sl::before{transform:translateX(20px)}
.mact{display:flex;gap:10px;margin-top:16px}
.btn{flex:1;padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);transition:opacity .2s}
.btn:active{opacity:.8}
.btn-p{background:var(--primary);color:#fff}
.btn-g{background:var(--surface);color:var(--subtext)}
.sr-row{display:flex;align-items:center;justify-content:space-between}
.th-btns,.ln-btns{display:flex;gap:8px}
.th-btn,.ln-btn{flex:1;padding:14px;border-radius:12px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all .2s;background:var(--surface);color:var(--text)}
.th-btn.active,.ln-btn.active{background:var(--primary);color:#fff;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.lst-card{cursor:pointer}
.atl{display:flex;gap:8px;margin-top:12px}
.atl input{flex:1}
.atl button{background:var(--primary);border:none;border-radius:10px;color:#fff;font-size:22px;width:44px;cursor:pointer}
.empty{display:flex;align-items:center;gap:8px;color:var(--subtext);font-size:14px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e293b;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all .3s;z-index:200;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.notif-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-top:1px solid var(--border);margin-top:4px}
.notif-row label{font-size:12px;color:var(--subtext);font-weight:500}
.notif-row input[type=datetime-local]{flex:1;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-family:var(--font);font-size:12px;outline:none}
.notif-row input[type=datetime-local]:focus{border-color:var(--primary)}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-40px)}to{opacity:1;transform:translateX(0)}}
.screen{animation:fi .2s ease}
.slide-left{animation:slideInLeft .25s cubic-bezier(.4,0,.2,1)}
.slide-right{animation:slideInRight .25s cubic-bezier(.4,0,.2,1)}
.prog-fill{transition:width .15s ease !important}
.wk-cell{min-height:54px;font-size:14px;}
.tk-check{transition:background .15s ease,border-color .15s ease !important}
</style>
</head>
<body>
<div id="app">
  <div id="sc" style="flex:1;overflow:hidden;display:flex;flex-direction:column"></div>
  <nav class="bnav">
    <button class="ni active" onclick="navigate(0)" id="n0">
      <svg class="ni-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
      <span class="ni-lbl" id="nl0">Accueil</span>
    </button>
    <button class="ni" onclick="navigate(1)" id="n1">
      <svg class="ni-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      <span class="ni-lbl" id="nl1">Calendrier</span>
    </button>
    <button class="ni add" onclick="navigate(2)">
      <svg class="ni-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>
      <span class="ni-lbl"></span>
    </button>
    <button class="ni" onclick="navigate(3)" id="n3">
      <svg class="ni-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M9 9l2 2 4-4"/><path d="M9 15l2 2 4-4"/></svg>
      <span class="ni-lbl" id="nl3">Tâches</span>
    </button>
    <button class="ni" onclick="navigate(4)" id="n4">
      <svg class="ni-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      <span class="ni-lbl" id="nl4">Paramètres</span>
    </button>
  </nav>
</div>
<div class="ov" id="ov" onclick="closeModal(event)"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

// ─── DB LAYER (localStorage + Firestore sync) ─────────────────────
const DB={
  get:(k,d='')=>{try{const v=localStorage.getItem('mf_'+k);return v===null?d:JSON.parse(v);}catch{return d;}},
  set:(k,v)=>{
    try{localStorage.setItem('mf_'+k,JSON.stringify(v));}catch{}
    // Sync to Firestore if logged in and key is data key
    if(window._fsDb && window._fsUser && ['tasks','lists','events'].includes(k)){
      _fsSave(k,v);
    }
  }
};
// Firestore save
async function _fsSave(key, val){
  try{
    const {doc,setDoc}=await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
    await setDoc(doc(window._fsDb,'users',window._fsUser.uid,'data',key),{val:JSON.stringify(val)},{merge:false});
  }catch(e){console.warn('Firestore save error:',e);}
}
// Firestore load all data
function _clearUserData(){
  // Efface toutes les données utilisateur du localStorage (tâches, événements, listes)
  const dataKeys = ['tasks','lists','events','pending_notifs'];
  dataKeys.forEach(k => localStorage.removeItem('mf_'+k));
  // Effacer aussi les notifs individuelles
  Object.keys(localStorage)
    .filter(k => k.startsWith('mf_notif_'))
    .forEach(k => localStorage.removeItem(k));
}

async function _fsLoad(){
  try{
    const {collection,getDocs}=await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
    // D'abord vider les données locales pour éviter la contamination entre comptes
    _clearUserData();
    const snap=await getDocs(collection(window._fsDb,'users',window._fsUser.uid,'data'));
    snap.forEach(d=>{
      const key=d.id, raw=d.data().val;
      if(raw) localStorage.setItem('mf_'+key, raw);
    });
    console.log('Firestore data loaded for', window._fsUser.uid);
  }catch(e){console.warn('Firestore load error:',e);}
}
let S={theme:DB.get('theme','light'),lang:DB.get('lang','fr'),nav:0,calY:new Date().getFullYear(),calM:new Date().getMonth(),selD:tiso()};
function tiso(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function logo(){return S.theme==='dark'?LD:LL;}
function T(){return TR[S.lang];}
// DATA
function getTasks(lid=null,dateFilter=null){
  const a=DB.get('tasks',[]);
  let tasks=lid!==null?a.filter(t=>t.lid===lid):a;
  if(dateFilter){
    tasks=tasks.filter(t=>{
      if(t.due===dateFilter)return true;
      if(!t.recurrence||t.recurrence==='none'||!t.due)return false;
      const start=new Date(t.due+'T00:00:00'),target=new Date(dateFilter+'T00:00:00');
      if(target<start)return false;
      if(t.recurrence==='daily')return true;
      if(t.recurrence==='weekly')return start.getDay()===target.getDay();
      if(t.recurrence==='monthly')return start.getDate()===target.getDate();
      if(t.recurrence==='yearly')return start.getMonth()===target.getMonth()&&start.getDate()===target.getDate();
      return false;
    });
  }
  return tasks;
}

function toggleTask(id){

    chk.classList.toggle('chk',!!tk.done);

  }

    else if(type==='all') subset=allTasks;
    else if(type.startsWith('list_')) subset=allTasks.filter(t=>t.lid===parseInt(type.slice(5)));
    else return;
    const total=subset.length;
    if(!total) return;
    const done=subset.filter(t=>t.done).length;
    const pct=Math.max(Math.round(done/total*100),done>0?1:0);
    const isDone=done===total;
    const fill=wrap.querySelector('.prog-fill');
    const val=wrap.querySelector('.prog-val');

  });
}

function bCal(){
  if(!S.calView)S.calView='month';

    const iso=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`,isT=iso===t0,isS=iso===S.selD;
    const dots=(ed.has(iso)?'<div class="cdot" style="background:var(--event-col)"></div>':'')+(tkd.has(iso)?'<div class="cdot" style="background:var(--task-col)"></div>':'');

  }

(function(){
  let tx=0,ty=0,moved=false,isH=false;
  const navOrder=[0,1,3,4];
  document.addEventListener('touchstart',e=>{
    tx=e.touches[0].clientX; ty=e.touches[0].clientY;
    moved=false; isH=false;
  },{passive:true});
  document.addEventListener('touchmove',e=>{
    if(moved)return;
    const dx=Math.abs(e.touches[0].clientX-tx);
    const dy=Math.abs(e.touches[0].clientY-ty);
    if(dx<8&&dy<8)return;
    moved=true; isH=dx>dy*1.2;
    if(isH)e.preventDefault();
  },{passive:false});
  document.addEventListener('touchend',e=>{
    if(!isH)return;
    if(document.getElementById('ov').classList.contains('open'))return;
    if(e.target.closest('.bnav'))return;
    const dx=e.changedTouches[0].clientX-tx;
    if(Math.abs(dx)<60)return;
    const cur=navOrder.indexOf(S.nav);
    if(dx<0&&cur<navOrder.length-1)render(navOrder[cur+1],'slide-right');
    else if(dx>0&&cur>0)render(navOrder[cur-1],'slide-left');
  },{passive:true});
})();

function openLst(lid,name){

    const tasks=DB.get('tasks',[]);

  }

    const tasks=getTasks(lid),done=tasks.filter(t=>t.done).length;
    let rows='';
    tasks.forEach(tk=>{
      rows+=`<div class="lst-item card" data-id="${tk.id}" style="margin:3px 0;touch-action:none">
        <div class="tk-row">
          <span class="drag-handle" style="font-size:18px;color:var(--subtext);cursor:grab;padding:0 6px;user-select:none">⠿</span>
          <div class="tk-check${tk.done?' chk':''}" data-tkid="${tk.id}" onclick="toggleTask(${tk.id});openLst(${lid},'${name.replace(/'/g,"\'")}')"></div>
          <div class="tk-body" style="flex:1"><div class="tk-title${tk.done?' done':''}">${tk.title}</div></div>
          <button class="del" onclick="delTask(${tk.id});openLst(${lid},'${name.replace(/'/g,"\'")}')">🗑</button>
        </div>
      </div>`;
    });
    _modal(`<div class="modal-title">${name}</div>
      ${pBar(done,tasks.length,'')}
      <div id="lst-cards">${rows}</div>
      <div class="atl"><input class="fi" id="lai" placeholder="${T().add_to_list}" onkeydown="if(event.key==='Enter')addToLst(${lid},'${name.replace(/'/g,"\'")}')"><button onclick="addToLst(${lid},'${name.replace(/'/g,"\'")}')">+</button></div>
      <button class="btn btn-g" style="margin-top:12px" onclick="closeModal({target:document.getElementById('ov')});render(3)">${T().close}</button>`);
    // Touch drag & drop
    document.querySelectorAll('#lst-cards .lst-item').forEach(card=>{
      let startY=0,clone=null,origIdx=0;
      const handle=card.querySelector('.drag-handle');
      handle.addEventListener('touchstart',e=>{
        e.stopPropagation();
        startY=e.touches[0].clientY;
        _dragId=parseInt(card.dataset.id);
        origIdx=Array.from(card.parentNode.children).indexOf(card);
        card.style.opacity='0.5';
      },{passive:true});
      handle.addEventListener('touchmove',e=>{
        e.stopPropagation(); e.preventDefault();
        const y=e.touches[0].clientY;
        const container=document.getElementById('lst-cards');
        const items=Array.from(container.querySelectorAll('.lst-item'));
        items.forEach(item=>{
          if(item===card)return;
          const r=item.getBoundingClientRect();
          const mid=r.top+r.height/2;
          if(y>r.top&&y<r.bottom){
            _dragOver=parseInt(item.dataset.id);
            const curIdx=items.indexOf(card);
            const tgtIdx=items.indexOf(item);
            if(curIdx<tgtIdx) container.insertBefore(card,item.nextSibling);
            else container.insertBefore(card,item);
          }
        });
      },{passive:false});
      handle.addEventListener('touchend',e=>{
        e.stopPropagation();
        card.style.opacity='1';
        _reorder();
        _dragId=null; _dragOver=null;
      },{passive:true});
    });
  }
  rdr();
}

// ─── SYSTÈME DE NOTIFICATIONS ────────────────────────────────────
// Stocke les rappels dans localStorage, le SW les vérifie au réveil
function scheduleNotif(title,dt,key){
  if(!('Notification' in window)){showToast('❌ Notifications non supportées');return;}
  Notification.requestPermission().then(perm=>{
    if(perm!=='granted'){showToast('❌ Active les notifications pour ce site');return;}
    const time=dt instanceof Date?dt.getTime():new Date(dt).getTime();
    if(time<=Date.now()){showToast('⚠️ Date déjà passée');return;}
    // Stocker le rappel
    const pending=DB.get('pending_notifs',[]).filter(n=>n.time>Date.now());
    pending.push({title,time,key:String(key)});
    DB.set('pending_notifs',pending);
    // Informer le SW
    if('serviceWorker' in navigator && navigator.serviceWorker.controller){
      navigator.serviceWorker.controller.postMessage({
        type:'SCHEDULE_NOTIF', title, time, key:String(key)
      });
    }
    const d=new Date(time);
    showToast('🔔 Rappel : '+d.toLocaleDateString(S.lang==='fr'?'fr-FR':'en-US',{day:'numeric',month:'short'})+' à '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}));
  });
}
function checkPendingNotifs(){
  if(!('Notification' in window)||Notification.permission!=='granted')return;
  const now=Date.now();
  const pending=DB.get('pending_notifs',[]);
  const due=pending.filter(n=>n.time<=now&&n.time>now-120000); // dans la fenêtre de 2min
  due.forEach(n=>{
    try{
      new Notification('🔔 MindFree',{
        body:n.title, icon:'icon-192.png',
        badge:'icon-192.png', vibrate:[200,100,200]
      });
    }catch(e){}
  });
  if(due.length) DB.set('pending_notifs',pending.filter(n=>n.time>now));
}
// Vérifier toutes les 30 secondes (plus réactif)
setInterval(checkPendingNotifs,30000);
// Vérifier aussi au focus de la page (retour depuis autre app)
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible') checkPendingNotifs();
});
// Demander permission au démarrage
if('Notification' in window && Notification.permission==='default'){
  setTimeout(()=>Notification.requestPermission().then(p=>{
    if(p==='granted') showToast('🔔 Notifications activées !');
  }),2000);
}

  const el = document.getElementById('auth-btn');
  if(!el) return;
  if(user) {
    el.style.padding = '0';
    el.style.overflow = 'hidden';
    el.innerHTML = user.photoURL
      ? `<img src="${user.photoURL}" style="width:36px;height:36px;border-radius:50%;object-fit:cover" onerror="this.outerHTML='<span style=font-size:18px>👤</span>'">`
      : `<span style="font-size:18px">👤</span>`;
    el.title = user.displayName || '';
    el.onclick = () => _showAccountModal(user);
  } else {
    el.style.padding = '';
    el.innerHTML = '👤';
    el.title = 'Se connecter avec Google';
    el.onclick = () => window._fsSignIn && window._fsSignIn();
  }
}

function _showAccountModal(user) {
  const photo = user.photoURL
    ? `<img src="${user.photoURL}" style="width:72px;height:72px;border-radius:50%;object-fit:cover;border:3px solid var(--primary);margin-bottom:10px">`
    : `<div style="width:72px;height:72px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 10px">👤</div>`;
  _modal(`<div class="modal-title">Mon compte</div>
    <div style="text-align:center;padding:8px 0 16px">
      ${photo}
      <div style="font-weight:700;font-size:17px;margin-bottom:4px">${user.displayName||'Utilisateur'}</div>
      <div style="font-size:13px;color:var(--subtext)">${user.email||''}</div>
    </div>
    <div style="background:var(--surface);border-radius:12px;padding:12px 16px;margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:10px;font-size:13px">
        <span style="font-size:18px">☁️</span>
        <div>
          <div style="font-weight:600">Synchronisation active</div>
          <div style="color:var(--subtext);font-size:12px">Tâches et événements sauvegardés</div>
        </div>
      </div>
    </div>
    <button class="mopt" style="color:#e05252;margin-bottom:4px" onclick="
      window._fsSignOut&&window._fsSignOut();
      closeModal({target:document.getElementById('ov')});
      showToast('👋 Déconnecté');">
      <span>🚪 Se déconnecter</span><span>›</span>
    </button>
    <button class="btn btn-g" style="width:100%;margin-top:4px" onclick="closeModal({target:document.getElementById('ov')})">Fermer</button>`);
}

// Override scheduleNotif to use FCM-aware SW
async function _sendScheduledViaWorker(title, timeMs, key) {
  try {
    const swReg = await navigator.serviceWorker.ready;
    swReg.active?.postMessage({ type:'SCHEDULE_NOTIF', title, time:timeMs, key });
  } catch(e) {}
}

// Patch scheduleNotif to also send to SW
const _origSchedule = scheduleNotif;
window.scheduleNotif = function(title, dt, key) {
  _origSchedule(title, dt, key);
  const timeMs = dt instanceof Date ? dt.getTime() : new Date(dt).getTime();
  _sendScheduledViaWorker(title, timeMs, String(key));
};

// Init
if('serviceWorker' in navigator && 'Notification' in window) {
  window.addEventListener('load', () => initFCM());
} else {
  if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
}

//  NOTIFICATION SYSTEM
// ═══════════════════════════════════════════
function reqNotifPerm(cb){
  if(!('Notification' in window)){cb&&cb(false);return;}
  if(Notification.permission==='granted'){cb&&cb(true);return;}
  Notification.requestPermission().then(p=>cb&&cb(p==='granted'));
}
function sendNotif(title,body,icon=''){
  if(Notification.permission!=='granted')return;
  new Notification(title,{body,icon:icon||'icon-192.png'});
}

function page_snack(msg){
  const t=document.createElement('div');
  t.className='toast show';
  t.style.cssText='bottom:90px;max-width:90%;text-align:center;white-space:normal';
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),4000);
}
